site_name: Code & Lab Wiki
site_description: Bioinformatics analyses, pipelines, and lab notes.
site_author: vmindel
site_url: https://vmindel.github.io/code-lab-wiki/

repo_name: vmindel/code-lab-wiki
repo_url: https://github.com/vmindel/code-lab-wiki
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Bioinformatics:
      - bioinformatics/index.md
      - General:
          - bioinformatics/general/index.md
      - Mammalian:
          - bioinformatics/mammalian/index.md
      - Yeast:
          - bioinformatics/yeast/index.md
          - ChEC-seq: bioinformatics/yeast/chec_seq.md
  - Lab:
      - lab/index.md
      - Sequencing Pool Prep: lab/sequencing-pool.md
