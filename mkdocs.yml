site_name: Code & Lab Wiki
site_description: Bioinformatics analyses, pipelines, and lab notes.
site_author: vmindel
site_url: https://vmindel.github.io/code-lab-wiki/

repo_name: vmindel/code-lab-wiki
repo_url: https://github.com/vmindel/code-lab-wiki
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep-purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep-purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Bioinformatics:
      - bioinformatics/index.md
      - General:
          - bioinformatics/general/index.md
          - Download Sequencing Data: bioinformatics/general/download_sequencing.md
          - Get Index Sequences: bioinformatics/general/get_barcodes.md
          - Demultiplexing (bcl2fastq): bioinformatics/general/demultiplexing.md
          - File Formats: bioinformatics/general/formats.md
          - Submitting Data to GEO: bioinformatics/general/sra_submission.md
          - Motif Finding (Homer): bioinformatics/general/homer_motif.md
          - ChEC-seq V-plots: bioinformatics/general/chec_vplots.md
          - Useful Code Snippets:
              - bioinformatics/general/code_snippets/index.md
              - Consensus Peaks + Signal (R): bioinformatics/general/code_snippets/r_consensus_peaks_signal.md
      - Mammalian:
          - bioinformatics/mammalian/index.md
          - Peak Calling (MACS3): bioinformatics/mammalian/peak_calling_macs3.md
          - CREs Data (SCREEN): bioinformatics/mammalian/cres_screen.md
      - Yeast:
          - bioinformatics/yeast/index.md
          - ChEC-seq: bioinformatics/yeast/chec_seq.md
          - Peak Calling (Homer): bioinformatics/yeast/peak_calling_homer.md
  - Lab:
      - lab/index.md
      - General:
          - SPRI Chart: lab/general/SPRI.md
          - Ladder: lab/general/ladder.md
      - Sequencing Pool Prep: lab/sequencing-pool.md
